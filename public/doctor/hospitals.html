<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareSync — Hospital Ratings</title>
<link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-icon">🏥</div><div class="sidebar-logo-text">CareSync</div></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main Menu</div>
      <a class="sidebar-item" href="dashboard.html"><span class="sidebar-item-icon">🏠</span>Dashboard</a>
      <a class="sidebar-item" href="profile.html"><span class="sidebar-item-icon">👨‍⚕️</span>My Profile</a>
      <a class="sidebar-item" href="patients.html"><span class="sidebar-item-icon">👥</span>My Patients</a>
      <a class="sidebar-item" href="schedule.html"><span class="sidebar-item-icon">📅</span>Schedule</a>
      <div class="sidebar-section-label">More</div>
      <a class="sidebar-item active" href="hospitals.html"><span class="sidebar-item-icon">🏩</span>Hospitals</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="sidebar-user-avatar avatar" id="sidebar-user-avatar">D</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebar-user-name">Doctor</div><div class="sidebar-user-role">Doctor Portal</div></div></div>
      <button class="btn btn-ghost btn-sm btn-full mt-2" onclick="api.logout()">🚪 Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div><div class="page-title" id="page-title">Hospital Ratings & Reviews</div><div class="page-subtitle" id="page-sub">View and rate hospitals you are associated with</div></div>
      <button class="btn btn-outline btn-sm hidden" id="back-btn" onclick="showList()">← Back to List</button>
    </div>

    <div class="page-body">
      <!-- LIST VIEW -->
      <div id="list-view">
        <div class="hospital-grid" id="hospital-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px;">
          <div class="empty-state"><div class="empty-icon">🏩</div><div class="empty-title">Loading...</div></div>
        </div>
      </div>

      <!-- DETAIL VIEW -->
      <div id="detail-view" class="hidden">
        <div style="background:linear-gradient(135deg,#0f172a,#1e3a5f,#0f766e);border-radius:var(--radius-lg);padding:32px;color:#fff;margin-bottom:24px;" id="hospital-header"></div>

        <div class="grid-2 gap-6">
          <div class="card">
            <div class="card-header"><div class="card-title">ℹ️ Hospital Details</div></div>
            <div class="card-body" id="hospital-info"></div>
          </div>

          <div class="card">
            <div class="card-header">
              <div class="card-title">⭐ Patient Reviews</div>
              <button class="btn btn-primary btn-sm" onclick="openModal()">Write Review</button>
            </div>
            <div class="card-body" id="hospital-reviews">
              <div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-title">No reviews yet</div></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Review Modal -->
<div class="modal-overlay" id="review-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Rate & Review Hospital</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label form-label-dark">Your Rating</label>
        <div id="star-input" style="font-size:36px;display:flex;gap:8px;cursor:pointer;">
          <span onclick="setRating(1)" style="color:#d1d5db;">★</span>
          <span onclick="setRating(2)" style="color:#d1d5db;">★</span>
          <span onclick="setRating(3)" style="color:#d1d5db;">★</span>
          <span onclick="setRating(4)" style="color:#d1d5db;">★</span>
          <span onclick="setRating(5)" style="color:#d1d5db;">★</span>
        </div>
      </div>
      <div class="form-group mb-0">
        <label class="form-label form-label-dark">Your Review</label>
        <textarea class="form-input-light" id="review-text" rows="4" placeholder="Share your professional experience working with this hospital..."></textarea>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:20px;">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitReview()">Submit Review</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
const user = requireAuth('doctor');
let allHospitals = [];
let currentHospitalId = null;
let selectedRating = 0;

if (user) { populateSidebarUser('doctor'); loadHospitals(); }

async function loadHospitals() {
  try {
    allHospitals = await api.hospitals.list();
    renderGrid(allHospitals);
  } catch(e) { showToast('Failed to load hospitals','error'); }
}

function renderGrid(hospitals) {
  const el = document.getElementById('hospital-grid');
  if (!hospitals.length) { el.innerHTML = '<div class="empty-state"><div class="empty-icon">🏩</div><div class="empty-title">No hospitals</div></div>'; return; }
  el.innerHTML = hospitals.map(h => `
    <div class="hospital-card" onclick="showHospital('${h.id}')">
      <div class="hospital-card-img">🏥</div>
      <div class="hospital-card-body">
        <div class="hospital-card-name">${h.name}</div>
        <div class="hospital-card-city">📍 ${h.city}</div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:4px;">🏷️ ${h.specialty}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;">
          <div style="display:flex;align-items:center;gap:4px;">
            <span style="color:var(--accent);font-size:18px;">★</span>
            <span style="font-weight:700;font-size:15px;">${h.avg_rating}</span>
            <span style="font-size:12px;color:var(--text-muted);">(${h.total_reviews})</span>
          </div>
          <span class="badge badge-teal">View →</span>
        </div>
      </div>
    </div>
  `).join('');
}

async function showHospital(id) {
  currentHospitalId = id;
  document.getElementById('list-view').classList.add('hidden');
  document.getElementById('detail-view').classList.remove('hidden');
  document.getElementById('back-btn').classList.remove('hidden');
  try {
    const h = await api.hospitals.get(id);
    document.getElementById('page-title').textContent = h.name;
    document.getElementById('page-sub').textContent = h.city + ' · ' + h.specialty;

    document.getElementById('hospital-header').innerHTML = `
      <div class="hospital-header-content">
        <div style="font-size:56px;">🏥</div>
        <div>
          <h2 style="font-size:26px;font-weight:800;font-family:'Poppins',sans-serif;">${h.name}</h2>
          <p style="color:rgba(255,255,255,0.6);margin-top:4px;">📍 ${h.address}, ${h.city}</p>
          <div style="display:flex;gap:12px;margin-top:12px;flex-wrap:wrap;justify-content:inherit;">
            <span style="background:rgba(255,255,255,0.12);color:#fff;padding:4px 14px;border-radius:99px;font-size:13px;font-weight:600;">🏷️ ${h.specialty}</span>
            <span style="background:rgba(245,158,11,0.25);color:#fcd34d;padding:4px 14px;border-radius:99px;font-size:13px;font-weight:600;">★ ${h.avg_rating} · ${h.total_reviews} reviews</span>
          </div>
        </div>
      </div>`;

    document.getElementById('hospital-info').innerHTML = `
      <div style="padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;"><span style="width:100px;color:var(--text-muted);font-size:13px;">📞 Phone</span><span style="font-size:14px;">${h.phone||'—'}</span></div>
      <div style="padding:12px 0;border-bottom:1px solid var(--border);display:flex;gap:12px;"><span style="width:100px;color:var(--text-muted);font-size:13px;">✉️ Email</span><span style="font-size:14px;">${h.email||'—'}</span></div>
      <div style="padding:12px 0;display:flex;gap:12px;"><span style="width:100px;color:var(--text-muted);font-size:13px;">📍 Address</span><span style="font-size:14px;">${h.address}, ${h.city}</span></div>
      <div style="margin-top:20px;padding:20px;background:var(--bg-secondary);border-radius:var(--radius);">
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px;">Overall Rating Breakdown</div>
        <div style="font-size:48px;font-weight:800;font-family:'Poppins',sans-serif;text-align:center;">${h.avg_rating}</div>
        <div style="text-align:center;font-size:24px;color:var(--accent);">${'★'.repeat(Math.round(h.avg_rating))}${'☆'.repeat(5-Math.round(h.avg_rating))}</div>
        <div style="text-align:center;font-size:13px;color:var(--text-muted);margin-top:6px;">Based on ${h.total_reviews} reviews</div>
      </div>`;

    const reviewsEl = document.getElementById('hospital-reviews');
    if (!h.reviews?.length) {
      reviewsEl.innerHTML = '<div class="empty-state"><div class="empty-icon">⭐</div><div class="empty-title">No reviews yet</div><div class="empty-text">Be the first to review this hospital</div></div>';
    } else {
      reviewsEl.innerHTML = h.reviews.map(r => `
        <div style="padding:14px 0;border-bottom:1px solid var(--border);">
          <div style="display:flex;justify-content:space-between;align-items:center;">
            <div style="font-weight:600;font-size:14px;">${r.reviewer_name}</div>
            <div style="color:var(--accent);font-size:16px;">${'★'.repeat(r.rating)}<span style="color:#d1d5db;">${'★'.repeat(5-r.rating)}</span></div>
          </div>
          ${r.review ? `<p style="font-size:13px;color:var(--text-muted);margin-top:6px;line-height:1.6;">${r.review}</p>` : ''}
          <p style="font-size:11px;color:var(--text-light);margin-top:4px;">${formatDate(r.created_at)}</p>
        </div>`).join('');
    }
  } catch(e) { showToast('Failed to load hospital','error'); }
}

function showList() {
  document.getElementById('list-view').classList.remove('hidden');
  document.getElementById('detail-view').classList.add('hidden');
  document.getElementById('back-btn').classList.add('hidden');
  document.getElementById('page-title').textContent = 'Hospital Ratings & Reviews';
  document.getElementById('page-sub').textContent = 'View and rate hospitals you are associated with';
}

function setRating(val) {
  selectedRating = val;
  document.querySelectorAll('#star-input span').forEach((s,i) => s.style.color = i < val ? 'var(--accent)' : '#d1d5db');
}

function openModal() { document.getElementById('review-modal').classList.add('open'); selectedRating = 0; document.querySelectorAll('#star-input span').forEach(s => s.style.color='#d1d5db'); }
function closeModal() { document.getElementById('review-modal').classList.remove('open'); }

async function submitReview() {
  if (!selectedRating) { showToast('Please select a rating','error'); return; }
  try {
    await api.hospitals.review(currentHospitalId, { rating: selectedRating, review: document.getElementById('review-text').value });
    showToast('Review submitted!','success');
    closeModal();
    showHospital(currentHospitalId);
  } catch(e) { showToast(e.message,'error'); }
}
</script>
</body>
</html>
