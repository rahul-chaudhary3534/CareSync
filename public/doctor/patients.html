<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareSync — My Patients</title>
<link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-icon">🏥</div><div class="sidebar-logo-text">CareSync</div></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main Menu</div>
      <a class="sidebar-item" href="dashboard.html"><span class="sidebar-item-icon">🏠</span>Dashboard</a>
      <a class="sidebar-item" href="profile.html"><span class="sidebar-item-icon">👨‍⚕️</span>My Profile</a>
      <a class="sidebar-item active" href="patients.html"><span class="sidebar-item-icon">👥</span>My Patients</a>
      <a class="sidebar-item" href="schedule.html"><span class="sidebar-item-icon">📅</span>Schedule</a>
      <div class="sidebar-section-label">More</div>
      <a class="sidebar-item" href="hospitals.html"><span class="sidebar-item-icon">🏩</span>Hospitals</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="sidebar-user-avatar avatar" id="sidebar-user-avatar">D</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebar-user-name">Doctor</div><div class="sidebar-user-role">Doctor Portal</div></div></div>
      <button class="btn btn-ghost btn-sm btn-full mt-2" onclick="api.logout()">🚪 Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div><div class="page-title" id="page-title">My Patients</div><div class="page-subtitle" id="page-sub">View patient info and upload reports</div></div>
      <button class="btn btn-outline btn-sm hidden" id="back-btn" onclick="showList()">← Back</button>
    </div>

    <div class="page-body">
      <!-- LIST VIEW -->
      <div id="list-view">
        <div style="margin-bottom:20px;">
          <input class="form-input-light" id="search-patients" placeholder="🔍 Search patients..." oninput="filterPatients()" style="max-width:380px;"/>
        </div>
        <div id="patients-grid">
          <div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Loading...</div></div>
        </div>
      </div>

      <!-- DETAIL VIEW -->
      <div id="detail-view" class="hidden">
        <div class="grid-2 gap-6 mb-6">
          <!-- Patient Info -->
          <div class="card">
            <div class="card-header"><div class="card-title">👤 Patient Information</div></div>
            <div class="card-body" id="patient-info-body"></div>
          </div>
          <!-- Upload Report -->
          <div class="card">
            <div class="card-header"><div class="card-title">📤 Upload Report / Prescription</div></div>
            <div class="card-body">
              <div class="form-group"><label class="form-label form-label-dark">Report Title *</label><input class="form-input-light" id="ur-title" placeholder="e.g. Blood Test Report"/></div>
              <div class="grid-2">
                <div class="form-group"><label class="form-label form-label-dark">Category</label>
                  <select class="form-input-light" id="ur-cat"><option>Prescription</option><option>Blood Test</option><option>Radiology</option><option>Discharge Summary</option><option>Other</option></select>
                </div>
                <div class="form-group"><label class="form-label form-label-dark">Date</label><input type="date" class="form-input-light" id="ur-date"/></div>
              </div>
              <div class="form-group"><label class="form-label form-label-dark">Notes</label><textarea class="form-input-light" id="ur-notes" rows="2" placeholder="Clinical notes..."></textarea></div>
              <div class="form-group">
                <div class="upload-zone" onclick="document.getElementById('ur-file').click()">
                  <div class="upload-icon">📎</div>
                  <p class="upload-text"><strong>Click to attach</strong> file</p>
                  <input type="file" id="ur-file" style="display:none" accept=".pdf,.jpg,.jpeg,.png" onchange="document.getElementById('ur-fname').textContent='📎 '+this.files[0]?.name"/>
                </div>
                <div id="ur-fname" style="font-size:13px;color:var(--primary);margin-top:6px;"></div>
              </div>
              <button class="btn btn-primary btn-full" onclick="uploadReport()">📤 Upload Report</button>
            </div>
          </div>
        </div>

        <!-- Patient Reports & Metrics -->
        <div class="grid-2 gap-6">
          <div class="card">
            <div class="card-header"><div class="card-title">📋 Medical Reports</div></div>
            <div class="card-body" id="patient-reports"></div>
          </div>
          <div class="card">
            <div class="card-header"><div class="card-title">📊 Health Metrics</div></div>
            <div class="card-body" id="patient-metrics"></div>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
const user = requireAuth('doctor');
let allPatients = [];
let currentPatientId = null;

if (user) { populateSidebarUser('doctor'); loadPatients(); }

async function loadPatients() {
  try {
    allPatients = await api.doctor.getPatients();
    renderPatients(allPatients);
    // Check URL param
    const qid = new URLSearchParams(window.location.search).get('id');
    if (qid) showPatient(qid);
  } catch(e) { showToast('Failed to load patients','error'); }
}

function renderPatients(pts) {
  const el = document.getElementById('patients-grid');
  if (!pts.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">No patients yet</div><div class="empty-text">Patients will appear here after booking appointments with you</div></div>';
    return;
  }
  el.innerHTML = `<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;">` + pts.map(p => `
    <div class="card" style="cursor:pointer;transition:var(--transition);" onclick="showPatient('${p.user_id}')" onmouseover="this.style.transform='translateY(-4px)';this.style.boxShadow='var(--shadow)'" onmouseout="this.style.transform='';this.style.boxShadow=''">
      <div class="card-body" style="display:flex;gap:14px;align-items:center;">
        <div class="avatar avatar-md" style="flex-shrink:0;">${(p.name||'?').charAt(0).toUpperCase()}</div>
        <div style="flex:1;overflow:hidden;">
          <div style="font-weight:700;font-size:15px;">${p.name||'Unknown'}</div>
          <div style="font-size:12px;color:var(--text-muted);margin-top:2px;">${p.email}</div>
          <div style="display:flex;gap:6px;margin-top:8px;flex-wrap:wrap;">
            ${p.blood_group ? `<span class="badge badge-red">${p.blood_group}</span>` : ''}
            <span class="badge badge-teal">${p.report_count} reports</span>
          </div>
        </div>
      </div>
    </div>
  `).join('') + '</div>';
}

function filterPatients() {
  const q = document.getElementById('search-patients').value.toLowerCase();
  renderPatients(allPatients.filter(p => (p.name||'').toLowerCase().includes(q) || (p.email||'').toLowerCase().includes(q)));
}

async function showPatient(id) {
  currentPatientId = id;
  document.getElementById('list-view').classList.add('hidden');
  document.getElementById('detail-view').classList.remove('hidden');
  document.getElementById('back-btn').classList.remove('hidden');
  document.getElementById('ur-date').value = new Date().toISOString().split('T')[0];
  try {
    const data = await api.doctor.getPatient(id);
    const p = data.profile || {};
    document.getElementById('page-title').textContent = p.name || 'Patient Details';
    document.getElementById('page-sub').textContent = p.email || '';

    document.getElementById('patient-info-body').innerHTML = `
      <div style="display:flex;gap:16px;align-items:center;margin-bottom:20px;flex-wrap:wrap;">
        <div class="avatar avatar-lg">${(p.name||'?').charAt(0).toUpperCase()}</div>
        <div>
          <div style="font-size:20px;font-weight:800;">${p.name||'—'}</div>
          <div style="font-size:13px;color:var(--text-muted);">${p.email||''}</div>
          <div class="flex gap-2 mt-2" style="flex-wrap:wrap;">${p.blood_group?`<span class="badge badge-red">🩸 ${p.blood_group}</span>`:''}${p.gender?`<span class="badge badge-teal">${p.gender}</span>`:''}</div>
        </div>
      </div>
      <div style="display:grid;gap:8px;">
        <div style="display:flex;gap:8px;"><span style="color:var(--text-muted);font-size:13px;width:120px;">Phone</span><span style="font-size:13px;">${p.phone||'—'}</span></div>
        <div style="display:flex;gap:8px;"><span style="color:var(--text-muted);font-size:13px;width:120px;">Date of Birth</span><span style="font-size:13px;">${formatDate(p.dob)}</span></div>
        <div style="display:flex;gap:8px;"><span style="color:var(--text-muted);font-size:13px;width:120px;">Height / Weight</span><span style="font-size:13px;">${p.height?p.height+'cm':'—'} / ${p.weight?p.weight+'kg':'—'}</span></div>
        <div style="display:flex;gap:8px;"><span style="color:var(--text-muted);font-size:13px;width:120px;">Allergies</span><span style="font-size:13px;">${p.allergies||'None'}</span></div>
        <div style="display:flex;gap:8px;"><span style="color:var(--text-muted);font-size:13px;width:120px;">Chronic</span><span style="font-size:13px;">${p.chronic_diseases||'None'}</span></div>
      </div>
    `;

    const rEl = document.getElementById('patient-reports');
    rEl.innerHTML = data.reports?.length ? data.reports.slice(0,5).map(r => `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="font-weight:600;font-size:14px;">${r.title}</div>
        <div style="font-size:12px;color:var(--text-muted);">${formatDate(r.report_date)} · ${r.category}</div>
        ${r.file_path ? `<a href="${r.file_path}" target="_blank" class="btn btn-outline btn-sm mt-2">📎 View</a>` : ''}
      </div>`).join('') : '<div class="empty-state" style="padding:30px;"><div class="empty-icon" style="font-size:32px;">📋</div><div class="empty-title">No reports yet</div></div>';

    const mEl = document.getElementById('patient-metrics');
    mEl.innerHTML = data.metrics?.length ? data.metrics.slice(0,6).map(m => `
      <div style="padding:10px 0;border-bottom:1px solid var(--border);">
        <div style="font-size:13px;font-weight:600;">${formatDate(m.date)}</div>
        <div style="font-size:12px;color:var(--text-muted);">BP ${m.bp_systolic||'—'}/${m.bp_diastolic||'—'} · Sugar ${m.blood_sugar||'—'} · Wt ${m.weight||'—'}kg</div>
      </div>`).join('') : '<div class="empty-state" style="padding:30px;"><div class="empty-icon" style="font-size:32px;">📊</div><div class="empty-title">No metrics logged</div></div>';
  } catch(e) { showToast('Failed to load patient','error'); }
}

function showList() {
  document.getElementById('list-view').classList.remove('hidden');
  document.getElementById('detail-view').classList.add('hidden');
  document.getElementById('back-btn').classList.add('hidden');
  document.getElementById('page-title').textContent = 'My Patients';
  document.getElementById('page-sub').textContent = 'View patient info and upload reports';
}

async function uploadReport() {
  if (!currentPatientId) return;
  const title = document.getElementById('ur-title').value;
  if (!title) { showToast('Title required', 'error'); return; }
  const fd = new FormData();
  fd.append('patient_id', currentPatientId);
  fd.append('title', title);
  fd.append('category', document.getElementById('ur-cat').value);
  fd.append('report_date', document.getElementById('ur-date').value);
  fd.append('description', document.getElementById('ur-notes').value);
  const file = document.getElementById('ur-file').files[0];
  if (file) fd.append('file', file);
  try {
    await api.doctor.uploadReport(fd);
    showToast('Report uploaded!', 'success');
    document.getElementById('ur-title').value = '';
    document.getElementById('ur-notes').value = '';
    document.getElementById('ur-fname').textContent = '';
    showPatient(currentPatientId);
  } catch(e) { showToast(e.message,'error'); }
}
</script>
</body>
</html>
