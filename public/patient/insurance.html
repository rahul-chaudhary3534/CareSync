<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CareSync — Certificates & Insurance</title>
<link rel="stylesheet" href="/css/styles.css"/>
</head>
<body>
<div class="app-layout">
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="sidebar-logo-icon">🏥</div><div class="sidebar-logo-text">CareSync</div></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Main Menu</div>
      <a class="sidebar-item" href="dashboard.html"><span class="sidebar-item-icon">🏠</span>Dashboard</a>
      <a class="sidebar-item" href="profile.html"><span class="sidebar-item-icon">👤</span>My Profile</a>
      <a class="sidebar-item" href="history.html"><span class="sidebar-item-icon">📋</span>Medical History</a>
      <a class="sidebar-item" href="appointments.html"><span class="sidebar-item-icon">🗓️</span>Appointments</a>
      <div class="sidebar-section-label">More</div>
      <a class="sidebar-item" href="hospitals.html"><span class="sidebar-item-icon">🏩</span>Hospitals</a>
      <a class="sidebar-item active" href="insurance.html"><span class="sidebar-item-icon">📄</span>Certificates</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user"><div class="sidebar-user-avatar avatar" id="sidebar-user-avatar">P</div><div class="sidebar-user-info"><div class="sidebar-user-name" id="sidebar-user-name">Patient</div><div class="sidebar-user-role">Patient Portal</div></div></div>
      <button class="btn btn-ghost btn-sm btn-full mt-2" onclick="api.logout()">🚪 Logout</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="page-header">
      <div><div class="page-title">Certificates & Insurance</div><div class="page-subtitle">Manage your insurance, medical and vaccination certificates</div></div>
      <button class="btn btn-primary btn-sm" onclick="openModal()">➕ Add Certificate</button>
    </div>

    <div class="page-body">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" onclick="filterType('all',this)">All</button>
        <button class="tab-btn" onclick="filterType('insurance',this)">🛡️ Insurance</button>
        <button class="tab-btn" onclick="filterType('medical',this)">🏥 Medical</button>
        <button class="tab-btn" onclick="filterType('vaccination',this)">💉 Vaccination</button>
      </div>

      <div id="cert-list">
        <div class="empty-state"><div class="empty-icon">📄</div><div class="empty-title">Loading...</div></div>
      </div>
    </div>
  </main>
</div>

<!-- Add Certificate Modal -->
<div class="modal-overlay" id="cert-modal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">Add Certificate / Document</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label form-label-dark">Document Type *</label>
        <select class="form-input-light" id="c-type">
          <option value="insurance">🛡️ Insurance Certificate</option>
          <option value="medical">🏥 Medical Certificate</option>
          <option value="vaccination">💉 Vaccination Certificate</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label form-label-dark">Title / Name *</label><input class="form-input-light" id="c-title" placeholder="e.g. Star Health Insurance Policy"/></div>
      <div class="form-group"><label class="form-label form-label-dark">Issuer / Organization</label><input class="form-input-light" id="c-issuer" placeholder="e.g. Star Health & Allied Insurance Co."/></div>
      <div class="grid-2">
        <div class="form-group"><label class="form-label form-label-dark">Issue Date</label><input type="date" class="form-input-light" id="c-issue"/></div>
        <div class="form-group"><label class="form-label form-label-dark">Expiry Date</label><input type="date" class="form-input-light" id="c-expiry"/></div>
      </div>
      <div class="form-group"><label class="form-label form-label-dark">Policy / Certificate Number</label><input class="form-input-light" id="c-policy" placeholder="e.g. POL-2024-XXXXX"/></div>
      <div class="form-group"><label class="form-label form-label-dark">Notes</label><textarea class="form-input-light" id="c-notes" rows="2" placeholder="Additional notes..."></textarea></div>
      <div class="form-group">
        <label class="form-label form-label-dark">Attach Document</label>
        <div class="upload-zone" onclick="document.getElementById('c-file').click()">
          <div class="upload-icon">📎</div>
          <p class="upload-text"><strong>Click to attach</strong> document</p>
          <input type="file" id="c-file" style="display:none" accept=".pdf,.jpg,.jpeg,.png" onchange="this.nextElementSibling.textContent='📎 '+this.files[0]?.name"/>
          <p style="font-size:12px;color:var(--primary);margin-top:6px;"></p>
        </div>
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end;">
        <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addCertificate()">Save Document</button>
      </div>
    </div>
  </div>
</div>

<script src="/js/api.js"></script>
<script src="/js/utils.js"></script>
<script>
const user = requireAuth('patient');
let allCerts = [];
let currentType = 'all';

if (user) { populateSidebarUser('patient'); loadCerts(); }

const typeConfig = {
  insurance: { icon: '🛡️', color: 'insurance', badge: 'badge-purple', label: 'Insurance' },
  medical:   { icon: '🏥', color: 'medical',   badge: 'badge-green',  label: 'Medical' },
  vaccination:{ icon:'💉', color:'vaccination', badge: 'badge-amber',  label: 'Vaccination' }
};

async function loadCerts() {
  try {
    allCerts = await api.patient.getCertificates();
    renderCerts(allCerts);
  } catch(e) { showToast('Failed to load certificates', 'error'); }
}

function filterType(type, btn) {
  currentType = type;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = type === 'all' ? allCerts : allCerts.filter(c => c.type === type);
  renderCerts(filtered);
}

function isExpired(date) {
  if (!date) return false;
  return new Date(date) < new Date();
}

function daysUntil(date) {
  if (!date) return null;
  const diff = new Date(date) - new Date();
  return Math.ceil(diff / (1000 * 60 * 60 * 24));
}

function renderCerts(certs) {
  const el = document.getElementById('cert-list');
  if (!certs.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📄</div><div class="empty-title">No documents found</div><div class="empty-text">Add your insurance, medical or vaccination certificates</div></div>';
    return;
  }
  el.innerHTML = certs.map(c => {
    const cfg = typeConfig[c.type] || typeConfig.medical;
    const expired = isExpired(c.expiry_date);
    const days = daysUntil(c.expiry_date);
    const expiryBadge = expired ? '<span class="badge badge-red">⚠️ Expired</span>' :
      (days !== null && days < 30) ? `<span class="badge badge-amber">⏳ Expires in ${days}d</span>` :
      c.expiry_date ? `<span class="badge badge-green">✅ Valid</span>` : '';
    return `
      <div class="cert-card">
        <div class="cert-icon ${cfg.color}">${cfg.icon}</div>
        <div style="flex:1;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:8px;">
            <div>
              <div style="font-size:16px;font-weight:700;">${c.title}</div>
              <div style="font-size:13px;color:var(--text-muted);margin-top:2px;">${c.issuer||''}</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center;">
              <span class="badge ${cfg.badge}">${cfg.label}</span>
              ${expiryBadge}
              <button class="btn btn-danger btn-sm" onclick="deleteCert('${c.id}')">🗑</button>
            </div>
          </div>
          <div style="display:flex;gap:20px;margin-top:10px;flex-wrap:wrap;">
            ${c.policy_number ? `<div style="font-size:12px;color:var(--text-muted);">📋 ${c.policy_number}</div>` : ''}
            ${c.issue_date ? `<div style="font-size:12px;color:var(--text-muted);">📅 Issued: ${formatDate(c.issue_date)}</div>` : ''}
            ${c.expiry_date ? `<div style="font-size:12px;color:${expired?'var(--danger)':'var(--text-muted)'};">🗓️ Expires: ${formatDate(c.expiry_date)}</div>` : ''}
          </div>
          ${c.notes ? `<p style="font-size:12px;color:var(--text-muted);margin-top:8px;">${c.notes}</p>` : ''}
          ${c.file_path ? `<a href="${c.file_path}" target="_blank" class="btn btn-outline btn-sm mt-3">📎 View Document</a>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function openModal() { document.getElementById('cert-modal').classList.add('open'); }
function closeModal() { document.getElementById('cert-modal').classList.remove('open'); }

async function addCertificate() {
  const title = document.getElementById('c-title').value;
  if (!title) { showToast('Title is required', 'error'); return; }
  const fd = new FormData();
  fd.append('type', document.getElementById('c-type').value);
  fd.append('title', title);
  fd.append('issuer', document.getElementById('c-issuer').value);
  fd.append('issue_date', document.getElementById('c-issue').value);
  fd.append('expiry_date', document.getElementById('c-expiry').value);
  fd.append('policy_number', document.getElementById('c-policy').value);
  fd.append('notes', document.getElementById('c-notes').value);
  const file = document.getElementById('c-file').files[0];
  if (file) fd.append('file', file);
  try {
    await api.patient.addCertificate(fd);
    showToast('Certificate added!', 'success');
    closeModal();
    loadCerts();
  } catch(e) { showToast(e.message, 'error'); }
}

async function deleteCert(id) {
  if (!confirm('Delete this certificate?')) return;
  await api.patient.deleteCertificate(id);
  showToast('Deleted', 'info');
  loadCerts();
}
</script>
</body>
</html>
